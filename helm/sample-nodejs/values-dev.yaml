replicaCount: 1

image:
  repository: 430658514390.dkr.ecr.us-east-1.amazonaws.com/sample-nodejs
  tag: sha-1ad2887
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

container:
  port: 8080

config:
  nodeEnv: production
  port: "8080"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

probes:
  liveness:
    path: /live
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
  readiness:
    path: /ready
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 3

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

ingress:
  enabled: true
  className: alb
  host: dev.liamdevops.com
  path: /
  pathType: Prefix
  certificateArn: ""
  scheme: internet-facing
  targetType: ip
