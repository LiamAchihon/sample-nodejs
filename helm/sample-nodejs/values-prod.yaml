replicaCount: 3

image:
  repository: 430658514390.dkr.ecr.us-east-1.amazonaws.com/sample-nodejs
  tag: sha-ee45c00
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

container:
  port: 8080

config:
  nodeEnv: production
  port: "8080"

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 750m
    memory: 512Mi

probes:
  liveness:
    path: /live
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
  readiness:
    path: /ready
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 3

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 65

ingress:
  enabled: true
  className: alb
  host: app.liamdevops.com
  path: /
  pathType: Prefix
  certificateArn: ""
  scheme: internet-facing
  targetType: ip

topologySpread:
  enabled: true
