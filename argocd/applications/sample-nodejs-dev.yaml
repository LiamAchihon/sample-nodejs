apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sample-nodejs-dev
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/LiamAchihon/sample-nodejs.git
    targetRevision: main
    path: helm/sample-nodejs
    helm:
      valueFiles:
        - values-dev.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
