name: CI/CD

on:
  pull_request:
    branches:
      - main
    paths:
      - "app.js"
      - "package.json"
      - "package-lock.json"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/ci.yaml"
      - "helm/**"
      - "terraform/**"
      - "argocd/**"
      - "scripts/**"

  push:
    branches:
      - main
    paths:
      - "app.js"
      - "package.json"
      - "package-lock.json"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/ci.yaml"

  workflow_dispatch:
  permissions:
  contents: read
  id-token: write

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  BUILD_ROLE_ARN: arn:aws:iam::430658514390:role/devops-k8s-task-shared-github-actions
  DEPLOY_ROLE_ARN: arn:aws:iam::430658514390:role/devops-k8s-task-shared-github-actions-deploy
  ECR_REGISTRY: 430658514390.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: sample-nodejs

jobs:
  build:
    name: Build Scan and Push
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      id-token: write

    outputs:
      image_tag: ${{ steps.image.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Setup Helm
        uses: azure/setup-helm@v5.0.0
        with:
          version: v3.18.4

      - name: Install Yamllint
        run: |
          sudo apt-get update
          sudo apt-get install -y yamllint

      - name: Hadolint Dockerfile
        run: |
          docker run --rm -i hadolint/hadolint < Dockerfile

      - name: Helm Lint
        run: |
          helm lint helm/sample-nodejs -f helm/sample-nodejs/values-dev.yaml
          helm lint helm/sample-nodejs -f helm/sample-nodejs/values-stage.yaml
          helm lint helm/sample-nodejs -f helm/sample-nodejs/values-prod.yaml

      - name: Terraform Fmt Check
        run: |
          terraform fmt -check -recursive terraform

      - name: Terraform Validate Bootstrap
        run: |
          cd terraform/bootstrap
          terraform init -backend=false
          terraform validate

      - name: Terraform Validate Shared
        run: |
          cd terraform/shared
          terraform init -backend=false
          terraform validate

      - name: Terraform Validate Dev
        run: |
          cd terraform/environments/dev
          terraform init -backend=false
          terraform validate

      - name: Terraform Validate Stage
        run: |
          cd terraform/environments/stage
          terraform init -backend=false
          terraform validate

      - name: Terraform Validate Prod
        run: |
          cd terraform/environments/prod
          terraform init -backend=false
          terraform validate

      - name: YAML Lint
        run: |
          yamllint helm
          yamllint argocd
          yamllint .github/workflows/ci.yaml

      - name: Node Syntax Check
        run: |
          node --check app.js

      - name: Dependency Scan
        run: |
          npm audit --audit-level=high

      - name: IaC Security Scan
        run: |
          pip install checkov
          checkov -d terraform --soft-fail

      - name: Install Semgrep
        run: |
          python3 -m pip install semgrep

      - name: SAST Scan
        run: |
          semgrep scan --config auto

      - name: Set Image Tag
        id: image
        run: |
          echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build Docker Image
        run: |
          docker build -t sample-nodejs:${{ steps.image.outputs.tag }} .

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Trivy Scan
        run: |
          trivy image --severity HIGH,CRITICAL --exit-code 1 --ignore-unfixed sample-nodejs:${{ steps.image.outputs.tag }}

      - name: Configure AWS Credentials
        if: github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.BUILD_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to ECR
        if: github.event_name == 'push'
        run: |
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 430658514390.dkr.ecr.us-east-1.amazonaws.com

      - name: Tag Docker Image
        if: github.event_name == 'push'
        run: |
          docker tag sample-nodejs:${{ steps.image.outputs.tag }} 430658514390.dkr.ecr.us-east-1.amazonaws.com/sample-nodejs:${{ steps.image.outputs.tag }}

      - name: Push Image to ECR
        if: github.event_name == 'push'
        run: |
          docker push 430658514390.dkr.ecr.us-east-1.amazonaws.com/sample-nodejs:${{ steps.image.outputs.tag }}

  deploy-dev:
    name: Deploy Dev
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Setup Helm
        uses: azure/setup-helm@v5.0.0
        with:
          version: v3.18.4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dnsutils

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Update Dev Image Tag
        run: |
          sed -i "s/tag:.*/tag: ${{ needs.build.outputs.image_tag }}/" helm/sample-nodejs/values-dev.yaml
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add helm/sample-nodejs/values-dev.yaml
          git commit -m "Deploy dev image ${{ needs.build.outputs.image_tag }} [skip ci]" || echo "No changes"
          git push

      - name: Connect to Dev Cluster
        run: |
          aws eks update-kubeconfig --region us-east-1 --name devops-k8s-task-dev-eks
          kubectl config current-context
          kubectl get nodes

      - name: Install Dev Addons
        run: |
          ./scripts/install-addons.sh dev

      - name: Verify Dev Addons
        run: |
          helm list -n kube-system
          kubectl get pods -n kube-system

      - name: Install ArgoCD Dev
        run: |
          ./scripts/install-argocd.sh dev

      - name: Verify ArgoCD Dev
        run: |
          kubectl get all -n argocd

      - name: Apply Dev Application
        run: |
          kubectl apply -f argocd/applications/sample-nodejs-dev.yaml

      - name: Verify Dev Application
        run: |
          kubectl get application sample-nodejs-dev -n argocd
          kubectl get all -n dev

      - name: Smoke Test Dev - Layers
        run: |
          POD=$(kubectl get pods -n dev -l app.kubernetes.io/instance=sample-nodejs-dev -o jsonpath='{.items[0].metadata.name}')
          ALB_DNS=$(kubectl get ingress sample-nodejs-dev -n dev -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')

          echo ""
          echo "Readiness Probe Test"
          kubectl exec -n dev $POD -- wget -qO- localhost:8080/ready

          echo ""
          echo "Liveness Probe Test"
          kubectl exec -n dev $POD -- wget -qO- localhost:8080/live

          echo ""
          echo "Smoke Test Layer 1 - Application Inside Pod"
          kubectl exec -n dev $POD -- wget -qO- localhost:8080/my-app

          echo ""
          echo "Smoke Test Layer 2 - Service To Pod Communication"
          kubectl exec -n dev $POD -- wget -qO- sample-nodejs-dev:80/my-app

          echo ""
          echo "Smoke Test Layer 3 - ALB / Ingress Communication"
          wget -qO- --header="Host: dev.liamdevops.com" http://$ALB_DNS/my-app

          echo ""
          echo "Smoke Test Layer 4 - DNS To Application"
          nslookup dev.liamdevops.com
          wget -qO- http://dev.liamdevops.com/my-app

  deploy-stage:
    name: Deploy Stage
    needs:
      - build
      - deploy-dev
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Setup Helm
        uses: azure/setup-helm@v5.0.0
        with:
          version: v3.18.4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dnsutils

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Update Stage Image Tag
        run: |
          sed -i "s/tag:.*/tag: ${{ needs.build.outputs.image_tag }}/" helm/sample-nodejs/values-stage.yaml
          git pull
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add helm/sample-nodejs/values-stage.yaml
          git commit -m "Deploy stage image ${{ needs.build.outputs.image_tag }} [skip ci]" || echo "No changes"
          git push

      - name: Connect to Stage Cluster
        run: |
          aws eks update-kubeconfig --region us-east-1 --name devops-k8s-task-stage-eks
          kubectl config current-context
          kubectl get nodes

      - name: Install Stage Addons
        run: |
          ./scripts/install-addons.sh stage

      - name: Verify Stage Addons
        run: |
          helm list -n kube-system
          kubectl get pods -n kube-system

      - name: Install ArgoCD Stage
        run: |
          ./scripts/install-argocd.sh stage

      - name: Verify ArgoCD Stage
        run: |
          kubectl get all -n argocd

      - name: Apply Stage Application
        run: |
          kubectl apply -f argocd/applications/sample-nodejs-stage.yaml

      - name: Verify Stage Application
        run: |
          kubectl get application sample-nodejs-stage -n argocd
          kubectl get all -n stage

      - name: Smoke Test Stage - Layers
        run: |
          POD=$(kubectl get pods -n stage -l app.kubernetes.io/instance=sample-nodejs-stage -o jsonpath='{.items[0].metadata.name}')
          ALB_DNS=$(kubectl get ingress sample-nodejs-stage -n stage -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')

          echo ""
          echo "Readiness Probe Test"
          kubectl exec -n stage $POD -- wget -qO- localhost:8080/ready

          echo ""
          echo "Liveness Probe Test"
          kubectl exec -n stage $POD -- wget -qO- localhost:8080/live

          echo ""
          echo "Smoke Test Layer 1 - Application Inside Pod"
          kubectl exec -n stage $POD -- wget -qO- localhost:8080/my-app

          echo ""
          echo "Smoke Test Layer 2 - Service To Pod Communication"
          kubectl exec -n stage $POD -- wget -qO- sample-nodejs-stage:80/my-app

          echo ""
          echo "Smoke Test Layer 3 - ALB / Ingress Communication"
          wget -qO- --header="Host: stage.liamdevops.com" http://$ALB_DNS/my-app

          echo ""
          echo "Smoke Test Layer 4 - DNS To Application"
          nslookup stage.liamdevops.com
          wget -qO- http://stage.liamdevops.com/my-app

  deploy-prod:
    name: Deploy Prod
    needs:
      - build
      - deploy-stage
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    environment:
      name: production
      url: https://app.liamdevops.com

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Setup Helm
        uses: azure/setup-helm@v5.0.0
        with:
          version: v3.18.4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dnsutils

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Update Prod Image Tag
        run: |
          sed -i "s/tag:.*/tag: ${{ needs.build.outputs.image_tag }}/" helm/sample-nodejs/values-prod.yaml
          git pull
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add helm/sample-nodejs/values-prod.yaml
          git commit -m "Deploy prod image ${{ needs.build.outputs.image_tag }} [skip ci]" || echo "No changes"
          git push

      - name: Connect to Prod Cluster
        run: |
          aws eks update-kubeconfig --region us-east-1 --name devops-k8s-task-prod-eks
          kubectl config current-context
          kubectl get nodes

      - name: Install Prod Addons
        run: |
          ./scripts/install-addons.sh prod

      - name: Verify Prod Addons
        run: |
          helm list -n kube-system
          kubectl get pods -n kube-system

      - name: Install ArgoCD Prod
        run: |
          ./scripts/install-argocd.sh prod

      - name: Verify ArgoCD Prod
        run: |
          kubectl get all -n argocd

      - name: Apply Prod Application
        run: |
          kubectl apply -f argocd/applications/sample-nodejs-prod.yaml

      - name: Verify Prod Application
        run: |
          kubectl get application sample-nodejs-prod -n argocd
          kubectl get all -n prod

      - name: Smoke Test Prod - Layers
        run: |
          POD=$(kubectl get pods -n prod -l app.kubernetes.io/instance=sample-nodejs-prod -o jsonpath='{.items[0].metadata.name}')
          ALB_DNS=$(kubectl get ingress sample-nodejs-prod -n prod -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')

          echo ""
          echo "Readiness Probe Test"
          kubectl exec -n prod $POD -- wget -qO- localhost:8080/ready

          echo ""
          echo "Liveness Probe Test"
          kubectl exec -n prod $POD -- wget -qO- localhost:8080/live

          echo ""
          echo "Smoke Test Layer 1 - Application Inside Pod"
          kubectl exec -n prod $POD -- wget -qO- localhost:8080/my-app

          echo ""
          echo "Smoke Test Layer 2 - Service To Pod Communication"
          kubectl exec -n prod $POD -- wget -qO- sample-nodejs-prod:80/my-app

          echo ""
          echo "Smoke Test Layer 3 - ALB / Ingress Communication"
          wget -qO- --header="Host: app.liamdevops.com" http://$ALB_DNS/my-app

          echo ""
          echo "Smoke Test Layer 4 - DNS To Application"
          nslookup app.liamdevops.com
          wget -qO- http://app.liamdevops.com/my-app
