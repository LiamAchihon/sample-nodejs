name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  BUILD_ROLE_ARN: arn:aws:iam::430658514390:role/devops-k8s-task-shared-github-actions
  DEPLOY_ROLE_ARN: arn:aws:iam::430658514390:role/devops-k8s-task-shared-github-actions-deploy
  ECR_REGISTRY: 430658514390.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: sample-nodejs

jobs:
  build:
    name: Build Scan and Push
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      id-token: write

    outputs:
      image_tag: ${{ steps.image.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Check application syntax
        run: node --check app.js

      - name: Install Bearer
        run: |
          curl -sfL \
            https://raw.githubusercontent.com/Bearer/bearer/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Run SAST scan
        run: bearer scan . --severity critical

      - name: Set image tag
        id: image
        run: echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            -t "sample-nodejs:${{ steps.image.outputs.tag }}" \
            .

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg

          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | gpg --dearmor \
            | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null

          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list

          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Scan Docker image
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --ignore-unfixed \
            "sample-nodejs:${{ steps.image.outputs.tag }}"

      - name: Configure AWS credentials
        if: github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.BUILD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.event_name == 'push'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push image to ECR
        if: github.event_name == 'push'
        run: |
          REMOTE_IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:${{ steps.image.outputs.tag }}"

          docker tag \
            "sample-nodejs:${{ steps.image.outputs.tag }}" \
            "${REMOTE_IMAGE}"

          docker push "${REMOTE_IMAGE}"

  deploy-dev:
    name: Deploy Dev
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Set up Helm
        uses: azure/setup-helm@v5.0.0
        with:
          version: v3.18.4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy Dev
        run: |
          ./scripts/deploy-environment.sh \
            dev \
            "${{ needs.build.outputs.image_tag }}"

  deploy-stage:
    name: Deploy Stage
    needs:
      - build
      - deploy-dev
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Set up Helm
        uses: azure/setup-helm@v5.0.0
        with:
          version: v3.18.4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy Stage
        run: |
          ./scripts/deploy-environment.sh \
            stage \
            "${{ needs.build.outputs.image_tag }}"

  deploy-prod:
    name: Deploy Prod
    needs:
      - build
      - deploy-stage
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: production
      url: https://app.liamdevops.com

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Set up Helm
        uses: azure/setup-helm@v5.0.0
        with:
          version: v3.18.4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy Prod
        run: |
          ./scripts/deploy-environment.sh \
            prod \
            "${{ needs.build.outputs.image_tag }}"
